<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quiz Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg1:#0b0e1a;--bg2:#111631;--bg3:#161b3a;
  --purple:#7c5cfc;--purple2:#5b3fd4;--purple-soft:rgba(124,92,252,.12);
  --teal:#14b8a6;--teal2:#0d9488;
  --amber:#f59e0b;--amber2:#d97706;
  --red:#ef4444;--green:#22c55e;
  --text:#e2e8f0;--muted:#64748b;--subtle:rgba(255,255,255,0.06);
  --card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg1);color:var(--text);overflow-x:hidden}
body{background:linear-gradient(160deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%)}

/* Layout */
.app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.scroll-page{min-height:100vh;padding:20px 14px;padding-bottom:100px;max-width:620px;margin:0 auto;width:100%}

/* Typography */
.title{font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:-1px;font-size:2.2rem}
.title span{color:var(--amber)}
.mono{font-family:'JetBrains Mono',monospace}
h3{font-size:1.1rem;font-weight:700;margin-bottom:12px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;width:100%}
.card-lg{max-width:620px}
.card-hover{transition:border-color .2s;cursor:pointer}
.card-hover:hover{border-color:rgba(124,92,252,.3)}

/* Inputs */
input,select,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--subtle);color:var(--text);font-size:15px;font-family:'Nunito',sans-serif;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:var(--purple)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:60px}
.code-input{letter-spacing:10px;text-align:center;font-weight:900;font-size:1.4rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase}
.pw-input{letter-spacing:2px;text-align:center;font-size:1.1rem}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:12px;border:none;font-size:1rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;width:100%}
.btn:active{transform:scale(.97)}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 4px 20px rgba(124,92,252,.25)}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff}
.btn-amber{background:linear-gradient(135deg,var(--amber),var(--amber2));color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1px solid rgba(124,92,252,.3);color:#c4b5fd}
.btn-ghost{background:none;border:none;color:var(--muted);font-size:13px;padding:8px 16px;width:auto;cursor:pointer;font-family:'Nunito',sans-serif}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:10px 18px;font-size:.9rem;width:auto}
.btn-row{display:flex;gap:8px}

/* Answer grid */
.answers{display:grid;gap:10px;width:100%;max-width:620px}
.answers.cols-2{grid-template-columns:1fr 1fr}
.ans-btn{border-radius:14px;padding:18px 14px;color:#fff;font-weight:700;font-size:1.05rem;border:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;min-height:60px;transition:all .15s;text-align:center;line-height:1.3}
.ans-btn:active{transform:scale(.96)}
.ans-btn.selected{border-color:#fff;transform:scale(1.03)}
.ans-btn.faded{opacity:.35}
.ans-btn .shape{font-size:1.2rem;opacity:.6}

/* Scoreboard */
.board{width:100%;max-width:400px}
.board-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-radius:12px;margin-bottom:5px;background:var(--card);animation:popIn .4s ease both}
.board-row.gold{background:rgba(250,204,21,.1)}
.board-row.me{background:var(--purple-soft);border:1px solid rgba(124,92,252,.25)}

/* Timer */
.timer{display:flex;align-items:center;gap:6px}
.timer-bar{width:80px;height:6px;background:var(--subtle);border-radius:3px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px;transition:width 1s linear}

/* Quiz bank list */
.bank-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:8px;transition:border-color .2s}
.bank-item:hover{border-color:rgba(124,92,252,.3)}
.bank-name{font-weight:700;font-size:15px;color:#fff}
.bank-count{font-size:12px;color:var(--muted)}
.bank-actions{display:flex;gap:6px}
.bank-actions button{background:var(--subtle);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--text);font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:600;transition:all .15s}
.bank-actions button:hover{border-color:var(--purple)}
.bank-actions .del:hover{border-color:var(--red);color:var(--red)}

/* Editor */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.opt-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.opt-check{width:26px;height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(--border);color:#fff;cursor:pointer;font-size:12px;background:var(--subtle);font-family:'Nunito',sans-serif}
.opt-check.on{background:var(--green);border-color:var(--green)}
.opt-check.round{border-radius:13px}.opt-check.square{border-radius:6px}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:40px}
.chip{border-radius:10px;padding:6px 16px;color:#fff;font-weight:700;font-size:14px;animation:popIn .3s ease}

/* Badge */
.badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;display:inline-block}
.badge-amber{background:rgba(245,158,11,.13);color:var(--amber)}
.badge-green{background:rgba(34,197,94,.13);color:var(--green)}
.badge-purple{background:var(--purple-soft);color:var(--purple)}
.badge-correct{background:var(--subtle);border:2px solid var(--border);padding:8px 16px;border-radius:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px}

/* Dots animation */
.dots{display:flex;justify-content:center;gap:6px;margin-top:16px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--purple);animation:pulse 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

/* Big elements */
.big-code{font-family:'JetBrains Mono',monospace;font-size:3.2rem;color:#fff;letter-spacing:14px;font-weight:900;text-shadow:0 0 40px rgba(245,158,11,.3)}
.trophy{font-size:3.5rem}
.winner-name{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:700;color:var(--amber)}

/* Utility */
.gap-8{display:flex;flex-direction:column;gap:8px}
.gap-10{display:flex;flex-direction:column;gap:10px}
.gap-14{display:flex;flex-direction:column;gap:14px}
.center{text-align:center}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}.mt-24{margin-top:24px}.mt-28{margin-top:28px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.row{display:flex;align-items:center;justify-content:space-between;width:100%}
.w100{width:100%}
.err{color:var(--red);font-size:13px;text-align:center}
.ok{color:var(--green);font-size:13px;text-align:center}
.info{color:var(--muted);font-size:12px;text-align:center;max-width:340px;line-height:1.6}
.sticky-head{position:sticky;top:0;z-index:10;background:var(--bg1);padding:12px 0;margin-bottom:12px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(transparent,var(--bg1) 30%);display:flex;gap:10px;justify-content:center;z-index:10}
.divider{width:100%;height:1px;background:var(--border);margin:16px 0}

/* Colors */
.c0{background:#e63946}.c1{background:#457b9d}.c2{background:#f4a261}.c3{background:#2a9d8f}.c4{background:#8b5cf6}.c5{background:#ec4899}
.vf0{background:#457b9d}.vf1{background:#e63946}

/* Role select cards */
.role-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:28px 24px;text-align:center;cursor:pointer;transition:all .2s;flex:1;max-width:180px}
.role-card:hover{border-color:var(--purple);transform:translateY(-2px)}
.role-card .icon{font-size:2.4rem;margin-bottom:8px}
.role-card .label{font-weight:800;font-size:1rem;margin-bottom:4px}
.role-card .desc{font-size:12px;color:var(--muted)}

/* Detail results */
.detail-q{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.detail-q-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.detail-q-num{font-family:'JetBrains Mono',monospace;color:var(--amber);font-weight:800;font-size:12px;flex-shrink:0;margin-right:10px}
.detail-q-text{font-weight:700;font-size:14px;line-height:1.4;flex:1}
.detail-pct{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14px;flex-shrink:0;margin-left:10px}
.detail-bar{width:100%;height:8px;background:var(--subtle);border-radius:4px;overflow:hidden;margin:8px 0 10px}
.detail-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.detail-correct{color:var(--green);font-size:13px;font-weight:600;margin-bottom:8px}
.detail-players{display:flex;flex-wrap:wrap;gap:4px}
.detail-chip{padding:3px 10px;border-radius:6px;font-size:12px;font-weight:600}
.detail-chip.ok{background:rgba(34,197,94,.12);color:var(--green)}
.detail-chip.ko{background:rgba(239,68,68,.1);color:var(--red)}
.detail-chip.partial{background:rgba(245,158,11,.1);color:var(--amber)}
.tab-row{display:flex;gap:0;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.tab-btn{flex:1;padding:10px;text-align:center;font-weight:700;font-size:14px;cursor:pointer;background:var(--subtle);border:none;color:var(--muted);font-family:'Nunito',sans-serif;transition:all .15s}
.tab-btn.active{background:var(--purple);color:#fff}
.player-stat{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:10px;background:var(--card);border:1px solid var(--border);margin-bottom:6px}
.player-stat-name{font-weight:700;font-size:14px}
.player-stat-bar{flex:1;margin:0 12px;height:6px;background:var(--subtle);border-radius:3px;overflow:hidden;max-width:120px}
.player-stat-fill{height:100%;border-radius:3px}
.player-stat-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;min-width:40px;text-align:right}

@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease}
</style>
</head>
<body>

<div id="app" class="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ==========================================================
// 🔥 CONFIGURATION FIREBASE — REMPLIS ICI
// ==========================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBfOrQttxjaNLGr2qjKyAfVIJjY7mzhoLQ",
  authDomain: "quiz-7e1ae.firebaseapp.com",
  databaseURL: "https://quiz-7e1ae-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quiz-7e1ae",
  storageBucket: "quiz-7e1ae.firebasestorage.app",
  messagingSenderId: "105217218519",
  appId: "1:105217218519:web:be5fe98759546fc9f2dd92"
};
// ==========================================================

const DEFAULT_TIMER = 20;
const SHAPES = ["▲","◆","●","■","★","▼"];
const COLORS = ["c0","c1","c2","c3","c4","c5"];
const CHIP_COLORS = ["#e63946","#457b9d","#f4a261","#2a9d8f","#8b5cf6","#ec4899"];

const SAMPLE_QUESTIONS = [
  {q:"Quelles sont les actions des filtres sur le respirateur ?",type:"multi",options:["Prévenir les infections croisées","Filtrer bactéries / virus","Protéger le ventilateur","Conditionner les gaz"],answers:[0,1,2,3]},
  {q:"Le filtre carré de la branche inspi du GE se change tous les 2 mois",type:"vf",options:["Vrai","Faux"],answers:[0]},
  {q:"Dans quel cas mettre un humidificateur ?",type:"multi",options:["Pathologies respiratoires","Ventilation invasive longue","ACR"],answers:[0,1]},
  {q:"Pourquoi mettre un humidificateur ?",type:"multi",options:["Débits importants","Confort du patient","Diminuer risque Barotraumatisme","Éviter dessèchement muqueuse respi"],answers:[0,1,3]},
  {q:"Quand changer le système clos ?",type:"multi",options:["Tous les 72h pour la partie sonde","Tous les 6 jours pour la partie rien","Tous les 72h"],answers:[0,1]},
  {q:"Le volume courant correspond au volume délivré à chaque cycle",type:"vf",options:["Vrai","Faux"],answers:[0]},
  {q:"La FR réglée correspond toujours à la FR du patient ?",type:"vf",options:["Vrai","Faux"],answers:[1]},
  {q:"La PEP permet d'éviter le collapsus ?",type:"vf",options:["Vrai","Faux"],answers:[0]},
  {q:"L'augmentation de la PEP diminue la pression de plateau",type:"vf",options:["Vrai","Faux"],answers:[1]},
  {q:"La pression crête dépend uniquement de la compliance pulmonaire ?",type:"vf",options:["Vrai","Faux"],answers:[1]},
  {q:"Le temps de pause inspiratoire permet de mesurer la pression de plateau",type:"vf",options:["Vrai","Faux"],answers:[0]},
  {q:"Le trigger permet au patient de déclencher le respi ?",type:"vf",options:["Vrai","Faux"],answers:[0]},
  {q:"Le volume minute dépend uniquement du respirateur en mode VAC ?",type:"vf",options:["Vrai","Faux"],answers:[1]},
  {q:"La pression de plateau reflète la compliance pulmonaire ?",type:"vf",options:["Vrai","Faux"],answers:[0]},
  {q:"Quels paramètres vérifier quand le patient est en VSAi ?",type:"multi",options:["VT","FR","Pplateau","Saturation O2"],answers:[0,1,3]},
  {q:"Plus le niveau d'Aide est important, plus le volume insufflé par le respirateur est important",type:"vf",options:["Vrai","Faux"],answers:[0]},
];

let db = null;
let gameRef = null, playersRef = null;
let timerInterval = null, currentTimer = 20, currentTimerTotal = 20;
let lastPlayersJSON = "";

let S = {
  screen:"home", error:"", msg:"",
  // Admin
  adminPw:"", banks:[], currentBank:null, editQ:[],
  // Game
  gameCode:"", gs:null, players:[], role:null,
  // Player
  playerName:"", joinCode:"", selectedAnswers:[], answered:false,
  // Detail results
  detailData:null, detailTab:"questions",
  // Import
  importText:"",
};

function setState(p){ Object.assign(S,p); render(); }
function mkCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
function mkId(){ return Date.now().toString(36)+Math.random().toString(36).substring(2,6); }
function esc(s){ const d=document.createElement("div");d.textContent=s;return d.innerHTML; }

// ============ FIREBASE ============
function initFirebase(){
  if(!FIREBASE_CONFIG.apiKey){ setState({screen:"config"}); return false; }
  try{ firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); return true; }
  catch(e){ setState({screen:"config",error:"Erreur: "+e.message}); return false; }
}

// ============ ADMIN: Password ============
async function checkAdminSetup(){
  const snap = await db.ref("admin/password").once("value");
  return snap.val();
}
async function setAdminPassword(pw){
  await db.ref("admin/password").set(pw);
}
async function doAdminLogin(){
  const pw = S.adminPw.trim();
  if(!pw){ setState({error:"Entre le mot de passe !"}); return; }
  const stored = await checkAdminSetup();
  if(!stored){
    // First time: set password
    await setAdminPassword(pw);
    setState({screen:"admin-dash",error:"",msg:""});
    loadBanks();
  } else if(stored === pw){
    setState({screen:"admin-dash",error:"",msg:""});
    loadBanks();
  } else {
    setState({error:"Mot de passe incorrect !"});
  }
}

// ============ ADMIN: Question Banks ============
async function loadBanks(){
  const snap = await db.ref("banks").once("value");
  const raw = snap.val()||{};
  const banks = Object.entries(raw).map(([id,b])=>({id,...b}));
  banks.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  setState({banks});
}

async function createBank(){
  const id = mkId();
  await db.ref("banks/"+id).set({
    name:"Nouveau quiz",
    createdAt:Date.now(),
    questions: SAMPLE_QUESTIONS
  });
  await loadBanks();
  // Open it for editing
  openBankEditor(id);
}

async function deleteBank(id){
  if(!confirm("Supprimer ce quiz définitivement ?")) return;
  await db.ref("banks/"+id).remove();
  loadBanks();
}

async function duplicateBank(id){
  const snap = await db.ref("banks/"+id).once("value");
  const bank = snap.val();
  if(!bank) return;
  const newId = mkId();
  await db.ref("banks/"+newId).set({...bank, name:bank.name+" (copie)", createdAt:Date.now()});
  loadBanks();
}

async function openBankEditor(id){
  const snap = await db.ref("banks/"+id).once("value");
  const bank = snap.val();
  if(!bank) return;
  setState({
    screen:"admin-edit",
    currentBank:{id,...bank,timerSeconds:bank.timerSeconds||DEFAULT_TIMER},
    editQ:JSON.parse(JSON.stringify(bank.questions||[])),
    error:"", msg:""
  });
}

async function saveBankQuestions(){
  const qs = S.editQ.filter(q=>q.q.trim());
  await db.ref("banks/"+S.currentBank.id+"/questions").set(qs);
  setState({msg:"✓ Sauvegardé !"});
  setTimeout(()=>setState({msg:""}),2000);
}

async function saveBankName(name){
  await db.ref("banks/"+S.currentBank.id+"/name").set(name);
  S.currentBank.name = name;
}

// ============ ADMIN: Launch Game ============
async function launchGame(bankId){
  const snap = await db.ref("banks/"+bankId).once("value");
  const bank = snap.val();
  if(!bank||!bank.questions?.length){ setState({error:"Ce quiz n'a pas de questions !"}); return; }
  const code = mkCode();
  const qs = bank.questions.filter(q=>q.q.trim()&&q.options.every(o=>o.trim()));
  const timerSec = bank.timerSeconds || DEFAULT_TIMER;
  await db.ref("games/"+code).set({
    state:{status:"lobby",currentQ:0,totalQ:qs.length,questions:qs,bankName:bank.name,timerSeconds:timerSec},
    players:{}
  });
  setState({gameCode:code,role:"host",screen:"host-lobby",error:""});
  listenGame(code);
}

// ============ GAME: Firebase listeners ============
function listenGame(code){
  stopListening();
  gameRef = db.ref("games/"+code+"/state");
  playersRef = db.ref("games/"+code+"/players");
  gameRef.on("value",snap=>{
    const g=snap.val(); if(!g)return;
    const prev=S.gs; S.gs=g;
    if(g.status==="question"&&(prev?.status!=="question"||prev?.currentQ!==g.currentQ)){
      if(S.role==="host"){setState({screen:"host-q"});startTimer(true);}
      else{setState({screen:"play-q",selectedAnswers:[],answered:false});startTimer(false);}
    }else if(g.status==="results"&&prev?.status!=="results"){
      stopTimer();setState({screen:S.role==="host"?"host-r":"play-w"});
    }else if(g.status==="final"&&prev?.status!=="final"){
      stopTimer();setState({screen:S.role==="host"?"host-f":"play-f"});
      if(S.role==="host")saveGameHistory();
    }
    // Don't re-render during questions — timer handles its own updates
  });
  playersRef.on("value",snap=>{
    const p=snap.val();S.players=p?Object.values(p):[];
    S.players.sort((a,b)=>b.score-a.score);
    const json=JSON.stringify(S.players);
    // Only re-render if players actually changed AND we're on a screen that shows them
    if(json!==lastPlayersJSON){
      lastPlayersJSON=json;
      const scr=S.screen;
      if(scr==="host-lobby"||scr==="host-r"||scr==="host-f"||scr==="play-f"||scr==="play-w") render();
    }
  });
}
function stopListening(){
  if(gameRef){gameRef.off();gameRef=null;}
  if(playersRef){playersRef.off();playersRef=null;}
  stopTimer();
}

// ============ TIMER ============
function getTimerDuration(){
  // Use bank timer if set, else default 20s
  if(S.gs && S.gs.timerSeconds) return S.gs.timerSeconds;
  return 20;
}
function startTimer(isHost){
  stopTimer();
  const dur = getTimerDuration();
  currentTimer = dur;
  currentTimerTotal = dur;
  render();
  timerInterval=setInterval(()=>{
    currentTimer--;
    updateTimerDOM();
    if(currentTimer<=0){stopTimer();if(isHost)doTimerEnd();}
    else if(isHost && currentTimer % 2 === 0) checkAllAnswered(); // check every 2 sec
  },1000);
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
function updateTimerDOM(){
  // Update timer elements without full re-render
  const bar = document.getElementById("timer-fill");
  const num = document.getElementById("timer-num");
  const circle = document.getElementById("timer-circle");
  const circleNum = document.getElementById("timer-circle-num");
  if(!bar && !circle) return;
  const dur = currentTimerTotal || 20;
  const pct = (currentTimer/dur)*100;
  const c = currentTimer<=3?"var(--red)":currentTimer<=7?"var(--amber)":"var(--green)";
  if(bar){bar.style.width=pct+"%";bar.style.background=c;}
  if(num){num.style.color=c;num.textContent=currentTimer;}
  if(circle){
    const circ = 2*Math.PI*54;
    const offset = circ * (1 - currentTimer/dur);
    circle.style.strokeDashoffset = offset;
    circle.style.stroke = currentTimer<=3?"#ef4444":currentTimer<=7?"#f59e0b":"#22c55e";
  }
  if(circleNum){circleNum.textContent=currentTimer;circleNum.style.fill=currentTimer<=3?"#ef4444":currentTimer<=7?"#f59e0b":"#22c55e";}
}

async function doTimerEnd(){
  const g=S.gs;if(!g)return;
  const snap=await db.ref("games/"+S.gameCode+"/answers/"+g.currentQ).once("value");
  const answers=Object.values(snap.val()||{});
  const dur=g.timerSeconds||DEFAULT_TIMER;
  const cSet=new Set(g.questions[g.currentQ].answers);
  const isM=g.questions[g.currentQ].type==="multi";
  const plSnap=await db.ref("games/"+S.gameCode+"/players").once("value");
  const raw=plSnap.val()||{};
  for(const[k,p]of Object.entries(raw)){
    const a=answers.find(x=>x.name===p.name);
    p.lastCorrect=false;p.lastPartial=false;
    if(!a)continue;
    const chosen=new Set(a.choices||[]);
    if(isM){
      const allOk=[...cSet].every(c=>chosen.has(c));
      const noWrong=[...chosen].every(c=>cSet.has(c));
      if(allOk&&noWrong){p.score=(p.score||0)+1000+Math.round((a.timeLeft/dur)*500);p.lastCorrect=true;}
      else{const pt=Math.max(0,Math.round(([...chosen].filter(c=>cSet.has(c)).length/cSet.size)*500));p.score=(p.score||0)+pt;p.lastPartial=pt>0;}
    }else{
      if(cSet.has(a.choices?.[0])){p.score=(p.score||0)+1000+Math.round((a.timeLeft/dur)*500);p.lastCorrect=true;}
    }
  }
  await db.ref("games/"+S.gameCode+"/players").set(raw);
  await db.ref("games/"+S.gameCode+"/state").update({status:"results"});
}

}

// ============ IMPORT PARSER ============
function parseImportText(text){
  const questions = [];
  // Split by blank lines (double newline)
  const blocks = text.split(/\n\s*\n/).map(b=>b.trim()).filter(b=>b);
  for(const block of blocks){
    const lines = block.split("\n").map(l=>l.trim()).filter(l=>l);
    if(lines.length < 2) continue;
    // First line = question
    let qText = lines[0];
    // Remove leading numbering like "1.", "1)", "Q:", "Q1:", etc.
    qText = qText.replace(/^(Q\d*[\s:.\-)]*|\d+[\s:.\-)]+)/i, "").trim();
    const options = [];
    const answers = [];
    for(let i=1; i<lines.length; i++){
      let line = lines[i];
      let isCorrect = false;
      // Check for correct answer markers: *, ✓, (correct), [x], ✅
      if(line.match(/^\s*\*/)){
        isCorrect = true;
        line = line.replace(/^\s*\*\s*/, "");
      } else if(line.match(/^\s*✓/)){
        isCorrect = true;
        line = line.replace(/^\s*✓\s*/, "");
      } else if(line.match(/^\s*✅/)){
        isCorrect = true;
        line = line.replace(/^\s*✅\s*/, "");
      } else if(line.match(/\(correct\)\s*$/i)){
        isCorrect = true;
        line = line.replace(/\s*\(correct\)\s*$/i, "");
      } else if(line.match(/^\s*\[x\]/i)){
        isCorrect = true;
        line = line.replace(/^\s*\[x\]\s*/i, "");
      }
      // Remove leading markers like "- ", "a) ", "A. ", etc.
      line = line.replace(/^[\s]*[-•]\s*/, "");
      line = line.replace(/^[a-fA-F]\s*[.)]\s*/, "");
      line = line.trim();
      if(!line) continue;
      if(isCorrect) answers.push(options.length);
      options.push(line);
    }
    if(options.length < 2) continue;
    // Determine type
    let type = "single";
    const isVF = options.length === 2 && 
      ((options[0].toLowerCase()==="vrai" && options[1].toLowerCase()==="faux") ||
       (options[0].toLowerCase()==="true" && options[1].toLowerCase()==="false"));
    if(isVF) type = "vf";
    else if(answers.length > 1) type = "multi";
    // If no answers marked, default first one
    if(answers.length === 0) answers.push(0);
    questions.push({ q: qText, type, options, answers });
  }
  return questions;
}

function doImport(){
  const parsed = parseImportText(S.importText);
  if(!parsed.length){
    setState({error: "Aucune question détectée. Vérifie le format !"});

  S.editQ = [...S.editQ, ...parsed];

// ============ DETAILED RESULTS ============
async function loadDetailedResults(){
  if(!S.gs||!S.gameCode)return;
  const qs=S.gs.questions;
  const totalQ=qs.length;
  const allAnswers=[];
  for(let i=0;i<totalQ;i++){
    try{
      const snap=await db.ref("games/"+S.gameCode+"/answers/"+i).once("value");
      allAnswers.push(Object.values(snap.val()||{}));
    }catch{allAnswers.push([]);}
  }
  // Build per-question stats
  const qStats=qs.map((q,qi)=>{
    const ans=allAnswers[qi]||[];
    const cSet=new Set(q.answers);
    const isM=q.type==="multi";
    const playerResults=S.players.map(p=>{
      const a=ans.find(x=>x.name===p.name);
      if(!a)return{name:p.name,status:"missed",choices:[]};
      const chosen=new Set(a.choices||[]);
      if(isM){
        const allOk=[...cSet].every(c=>chosen.has(c));
        const noWrong=[...chosen].every(c=>cSet.has(c));
        if(allOk&&noWrong)return{name:p.name,status:"correct",choices:a.choices};
        const hasPartial=[...chosen].some(c=>cSet.has(c));
        return{name:p.name,status:hasPartial?"partial":"wrong",choices:a.choices};
      }else{
        return{name:p.name,status:cSet.has(a.choices?.[0])?"correct":"wrong",choices:a.choices};
      }
    });
    const nCorrect=playerResults.filter(r=>r.status==="correct").length;
    const pct=S.players.length?Math.round((nCorrect/S.players.length)*100):0;
    return{q:q.q,type:q.type,options:q.options,answers:q.answers,playerResults,nCorrect,pct};
  });
  // Build per-player stats
  const pStats=S.players.map(p=>{
    let correct=0,partial=0;
    qStats.forEach(qs=>{
      const r=qs.playerResults.find(x=>x.name===p.name);
      if(r?.status==="correct")correct++;
      else if(r?.status==="partial")partial++;
    });
    return{name:p.name,score:p.score,correct,partial,total:totalQ,pct:Math.round((correct/totalQ)*100)};
  });
  setState({detailData:{qStats,pStats},screen:S.role==="host"?"host-detail":"play-detail"});
}

      <div class="row mb-8" style="max-width:520px;margin:0 auto">
        <span class="mono" style="color:var(--muted);font-size:13px">${S.gs.currentQ+1}/${S.gs.totalQ}</span>
        ${isM?'<span class="badge badge-amber">MULTI</span>':""}
        <div></div>
      </div>
      ${bigTimerHTML()}
      <div class="card center mb-16 mt-12" style="padding:18px 16px;max-width:520px">
        <h2 style="font-size:1.15rem;line-height:1.5;font-weight:700">${esc(q.q)}</h2>
      </div>
      <div class="answers cols-2" style="max-width:520px;margin:0 auto">${answerGrid(q,true,true)}</div>
      ${isM&&!S.answered?`<button class="btn btn-purple mt-16" id="btn-val" ${!S.selectedAnswers.length?"disabled":""} style="max-width:340px">Valider (${S.selectedAnswers.length})</button>`:""}
      ${S.answered?'<p style="color:var(--green);margin-top:14px;font-weight:700;font-size:14px">✓ Envoyé !</p>':""}
    </div>`;
    root.querySelectorAll("[data-ans]").forEach(el=>el.onclick=()=>doToggle(+el.dataset.ans));
    const vb=document.getElementById("btn-val");if(vb)vb.onclick=()=>doSubmit(S.selectedAnswers);
    return;
  }

  // PLAYER WAIT
  if(S.screen==="play-w"){
    root.className="app";
    const me=S.players.find(p=>p.name===S.playerName);
    const rank=S.players.findIndex(p=>p.name===S.playerName)+1;
    const emoji=me?.lastCorrect?"🎉":me?.lastPartial?"🤏":"😬";
    const msg=me?.lastCorrect?"Bravo !":me?.lastPartial?"Presque !":"Raté !";
    const clr=me?.lastCorrect?"var(--green)":me?.lastPartial?"var(--amber)":"var(--red)";
    const medal=rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":`#${rank}`;
    root.innerHTML=`<div class="fade-in center">
      <div style="font-size:3rem;margin-bottom:8px">${emoji}</div>
      <h2 class="title" style="font-size:1.4rem;color:${clr}">${msg}</h2>
      <p style="color:#c084fc;font-size:1.1rem;margin:8px 0;font-weight:700">${medal} — ${me?.score||0} pts</p>
      <p style="color:var(--muted);font-size:13px;margin-top:20px">Question suivante...</p>
    </div>`;
    return;
  }
}

// ============ BOOT ============
function isAdmin(){ return window.location.search.includes("admin"); }
function getBaseURL(){ return window.location.origin + window.location.pathname; }
function getQRUrl(code){
  const joinUrl = getBaseURL() + "#" + code;
  return "https://api.qrserver.com/v1/create-qr-code/?size=280x280&color=e2e8f0&bgcolor=111631&data=" + encodeURIComponent(joinUrl);
}
function downloadQR(){
  const code = S.gameCode;
  const url = getQRUrl(code);
  const a = document.createElement("a");
  a.href = url; a.download = "quiz-" + code + ".png"; a.target = "_blank";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

window.addEventListener("DOMContentLoaded",()=>{
  if(!initFirebase()) return;
  // Check if player arrived via QR code with hash code
  const hash = window.location.hash.replace("#","").trim();
  if(hash && hash.length === 6 && !isAdmin()){
    setState({screen:"player-join", joinCode: hash.toUpperCase(), error:""});
  } else if(isAdmin()){
    setState({screen:"admin-login", error:"", adminPw:""});
  } else {
    setState({screen:"player-join", error:""});
  }
});
</script>
</body>
