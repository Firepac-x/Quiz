<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quiz Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg1:#080a14;--bg2:#0d1025;--bg3:#10142e;
  --purple:#8b6cff;--purple2:#6a4ee0;--purple-soft:rgba(139,108,255,.1);--purple-glow:rgba(139,108,255,.2);
  --teal:#34d399;--teal2:#10b981;
  --amber:#fbbf24;--amber2:#f59e0b;
  --red:#f87171;--green:#4ade80;
  --text:#f0f0f5;--muted:#6b7294;--subtle:rgba(255,255,255,0.05);
  --card:rgba(255,255,255,0.03);--card2:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --glass:rgba(255,255,255,0.04);
}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg1);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{background:var(--bg1);background-image:
  radial-gradient(ellipse 80% 60% at 50% 0%,rgba(139,108,255,.08) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 100%,rgba(52,211,153,.05) 0%,transparent 50%);
  background-attachment:fixed}

/* Layout */
.app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.scroll-page{min-height:100vh;padding:20px 14px;padding-bottom:100px;max-width:620px;margin:0 auto;width:100%}

/* Typography */
.title{font-family:'Outfit',sans-serif;font-weight:800;letter-spacing:-.5px;font-size:2.2rem}
.title span{color:var(--amber);text-shadow:0 0 30px rgba(251,191,36,.2)}
.mono{font-family:'JetBrains Mono',monospace}
h3{font-size:1.1rem;font-weight:700;margin-bottom:12px}

/* Cards */
.card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:20px;padding:16px;width:100%}
.card-lg{max-width:620px}
.card-hover{transition:all .25s;cursor:pointer}
.card-hover:hover{border-color:var(--purple-glow);box-shadow:0 0 20px var(--purple-glow)}

/* Inputs */
input,select,textarea{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border);background:var(--subtle);color:var(--text);font-size:15px;font-family:'Outfit',sans-serif;outline:none;transition:all .25s}
input:focus,textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,108,255,.15)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:60px}
.code-input{letter-spacing:12px;text-align:center;font-weight:900;font-size:1.5rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;background:var(--card2);border:2px solid var(--border2)}
.code-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(251,191,36,.15)}
.pw-input{letter-spacing:3px;text-align:center;font-size:1.1rem}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:14px;border:none;font-size:1rem;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .2s;width:100%;position:relative;overflow:hidden}
.btn:active{transform:scale(.96)}
.btn:hover{transform:translateY(-1px)}
.btn-purple{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 8px 30px rgba(139,108,255,.3)}
.btn-purple:hover{box-shadow:0 12px 40px rgba(139,108,255,.4)}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#0a1a10;box-shadow:0 8px 30px rgba(52,211,153,.2)}
.btn-amber{background:linear-gradient(135deg,var(--amber),var(--amber2));color:#1a1000;box-shadow:0 8px 30px rgba(251,191,36,.2)}
.btn-red{background:linear-gradient(135deg,#f87171,#ef4444);color:#fff}
.btn-outline{background:var(--glass);border:1px solid var(--border2);color:#c4b5fd;backdrop-filter:blur(10px)}
.btn-outline:hover{border-color:var(--purple);background:var(--purple-soft)}
.btn-ghost{background:none;border:none;color:var(--muted);font-size:13px;padding:8px 16px;width:auto;cursor:pointer;font-family:'Outfit',sans-serif;transition:color .2s}
.btn-ghost:hover{color:var(--text)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-sm{padding:10px 18px;font-size:.85rem;width:auto;border-radius:10px}
.btn-row{display:flex;gap:8px}

/* Answer grid */
.answers{display:grid;gap:12px;width:100%;max-width:620px}
.answers.cols-2{grid-template-columns:1fr 1fr}
.ans-btn{border-radius:16px;padding:20px 16px;color:#fff;font-weight:700;font-size:1.05rem;border:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;min-height:64px;transition:all .2s;text-align:center;line-height:1.3;box-shadow:0 4px 15px rgba(0,0,0,.2)}
.ans-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.ans-btn:active{transform:scale(.96)}
.ans-btn.selected{border-color:rgba(255,255,255,.9);transform:scale(1.03);box-shadow:0 0 25px rgba(255,255,255,.15)}
.ans-btn.faded{opacity:.25;transform:scale(.97)}
.ans-btn .shape{font-size:1.3rem;opacity:.5}

/* Scoreboard */
.board{width:100%;max-width:420px}
.board-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-radius:14px;margin-bottom:6px;background:var(--card);border:1px solid var(--border);animation:popIn .4s ease both;backdrop-filter:blur(10px)}
.board-row.gold{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(251,191,36,.03));border-color:rgba(251,191,36,.15)}
.board-row.me{background:var(--purple-soft);border:1px solid rgba(139,108,255,.2)}

/* Timer */
.timer{display:flex;align-items:center;gap:6px}
.timer-bar{width:80px;height:6px;background:var(--subtle);border-radius:3px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px;transition:width 1s linear}

/* Quiz bank list */
.bank-item{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-radius:16px;background:var(--card);border:1px solid var(--border);margin-bottom:10px;transition:all .25s}
.bank-item:hover{border-color:var(--purple-glow);box-shadow:0 4px 20px rgba(139,108,255,.08);transform:translateY(-1px)}
.bank-name{font-weight:700;font-size:15px;color:#fff}
.bank-count{font-size:12px;color:var(--muted);margin-top:2px}
.bank-actions{display:flex;gap:6px}
.bank-actions button{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:7px 14px;color:var(--text);font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:600;transition:all .2s}
.bank-actions button:hover{border-color:var(--purple);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2)}
.bank-actions .del:hover{border-color:var(--red);color:var(--red)}

/* Editor */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;transition:border-color .2s}
.q-card:hover{border-color:var(--border2)}
.q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.opt-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.opt-check{width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:2px solid var(--border2);color:#fff;cursor:pointer;font-size:13px;background:var(--subtle);font-family:'Outfit',sans-serif;transition:all .2s}
.opt-check:hover{border-color:var(--green)}
.opt-check.on{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(74,222,128,.25)}
.opt-check.round{border-radius:14px}.opt-check.square{border-radius:7px}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:40px}
.chip{border-radius:12px;padding:8px 18px;color:#fff;font-weight:700;font-size:14px;animation:popIn .3s ease;backdrop-filter:blur(10px)}

/* Badge */
.badge{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;display:inline-block;letter-spacing:.3px}
.badge-amber{background:rgba(251,191,36,.12);color:var(--amber)}
.badge-green{background:rgba(74,222,128,.12);color:var(--green)}
.badge-purple{background:var(--purple-soft);color:var(--purple)}
.badge-correct{background:var(--card2);border:2px solid var(--border2);padding:10px 18px;border-radius:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px;font-size:.95rem}

/* Dots animation */
.dots{display:flex;justify-content:center;gap:8px;margin-top:20px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--purple);animation:pulse 1.4s ease infinite;box-shadow:0 0 10px var(--purple-glow)}
.dot:nth-child(2){animation-delay:.25s}.dot:nth-child(3){animation-delay:.5s}

/* Big elements */
.big-code{font-family:'JetBrains Mono',monospace;font-size:3.4rem;color:#fff;letter-spacing:16px;font-weight:900;text-shadow:0 0 50px rgba(251,191,36,.25),0 0 100px rgba(251,191,36,.1);background:linear-gradient(180deg,#fff 30%,rgba(251,191,36,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trophy{font-size:4rem;filter:drop-shadow(0 0 20px rgba(251,191,36,.3))}
.winner-name{font-family:'Outfit',sans-serif;font-size:2.2rem;font-weight:900;color:var(--amber);text-shadow:0 0 30px rgba(251,191,36,.2);letter-spacing:-.5px}

/* Utility */
.gap-8{display:flex;flex-direction:column;gap:8px}
.gap-10{display:flex;flex-direction:column;gap:10px}
.gap-14{display:flex;flex-direction:column;gap:14px}
.center{text-align:center}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}.mt-24{margin-top:24px}.mt-28{margin-top:28px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.row{display:flex;align-items:center;justify-content:space-between;width:100%}
.w100{width:100%}
.err{color:var(--red);font-size:13px;text-align:center;font-weight:600}
.ok{color:var(--green);font-size:13px;text-align:center;font-weight:600}
.info{color:var(--muted);font-size:12px;text-align:center;max-width:340px;line-height:1.7}
.sticky-head{position:sticky;top:0;z-index:10;background:rgba(8,10,20,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:14px 0;margin-bottom:12px;border-bottom:1px solid var(--border)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 16px;background:linear-gradient(transparent,var(--bg1) 40%);display:flex;gap:10px;justify-content:center;z-index:10}
.divider{width:100%;height:1px;background:var(--border);margin:16px 0}

/* Colors — richer, more saturated */
.c0{background:linear-gradient(135deg,#ef4444,#dc2626)}.c1{background:linear-gradient(135deg,#3b82f6,#2563eb)}.c2{background:linear-gradient(135deg,#f59e0b,#d97706)}.c3{background:linear-gradient(135deg,#10b981,#059669)}.c4{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}.c5{background:linear-gradient(135deg,#ec4899,#db2777)}
.vf0{background:linear-gradient(135deg,#3b82f6,#2563eb)}.vf1{background:linear-gradient(135deg,#ef4444,#dc2626)}

/* Role select cards */
.role-card{background:var(--card);border:2px solid var(--border);border-radius:24px;padding:32px 24px;text-align:center;cursor:pointer;transition:all .3s;flex:1;max-width:180px;backdrop-filter:blur(20px)}
.role-card:hover{border-color:var(--purple);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,.3),0 0 30px var(--purple-glow)}
.role-card .icon{font-size:2.6rem;margin-bottom:10px}
.role-card .label{font-weight:800;font-size:1.05rem;margin-bottom:4px}
.role-card .desc{font-size:12px;color:var(--muted);line-height:1.4}

/* Detail results */
.detail-q{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.detail-q-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.detail-q-num{font-family:'JetBrains Mono',monospace;color:var(--amber);font-weight:800;font-size:12px;flex-shrink:0;margin-right:10px}
.detail-q-text{font-weight:700;font-size:14px;line-height:1.4;flex:1}
.detail-pct{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14px;flex-shrink:0;margin-left:10px}
.detail-bar{width:100%;height:8px;background:var(--subtle);border-radius:4px;overflow:hidden;margin:8px 0 10px}
.detail-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.detail-correct{color:var(--green);font-size:13px;font-weight:600;margin-bottom:8px}
.detail-players{display:flex;flex-wrap:wrap;gap:5px}
.detail-chip{padding:4px 12px;border-radius:8px;font-size:12px;font-weight:600}
.detail-chip.ok{background:rgba(74,222,128,.12);color:var(--green)}
.detail-chip.ko{background:rgba(248,113,113,.1);color:var(--red)}
.detail-chip.partial{background:rgba(251,191,36,.1);color:var(--amber)}
.tab-row{display:flex;gap:0;margin-bottom:20px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--card)}
.tab-btn{flex:1;padding:12px;text-align:center;font-weight:700;font-size:14px;cursor:pointer;background:transparent;border:none;color:var(--muted);font-family:'Outfit',sans-serif;transition:all .2s}
.tab-btn.active{background:var(--purple);color:#fff;box-shadow:inset 0 0 20px rgba(0,0,0,.1)}
.player-stat{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:6px}
.player-stat-name{font-weight:700;font-size:14px}
.player-stat-bar{flex:1;margin:0 12px;height:6px;background:var(--subtle);border-radius:3px;overflow:hidden;max-width:120px}
.player-stat-fill{height:100%;border-radius:3px}
.player-stat-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;min-width:40px;text-align:right}

/* Animated background orbs */
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:.5}
body::before{width:400px;height:400px;background:rgba(139,108,255,.06);top:-100px;right:-100px;animation:float 20s ease-in-out infinite}
body::after{width:350px;height:350px;background:rgba(52,211,153,.04);bottom:-80px;left:-80px;animation:float 25s ease-in-out infinite reverse}
#app{position:relative;z-index:1}

@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.fade-in{animation:fadeIn .4s ease}

/* Category tabs */
.cat-tab{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);font-family:'Outfit',sans-serif;white-space:nowrap;transition:all .2s;flex-shrink:0}
.cat-tab:hover{border-color:var(--purple-glow);color:var(--text)}
.cat-tab.active{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 4px 15px rgba(139,108,255,.25)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
</style>
</head>

<script>
// ==========================================================
// 🔥 CONFIGURATION FIREBASE — REMPLIS ICI
// ==========================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBfOrQttxjaNLGr2qjKyAfVIJjY7mzhoLQ",
  authDomain: "quiz-7e1ae.firebaseapp.com",
  databaseURL: "https://quiz-7e1ae-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quiz-7e1ae",
  storageBucket: "quiz-7e1ae.firebasestorage.app",
  messagingSenderId: "105217218519",
  appId: "1:105217218519:web:be5fe98759546fc9f2dd92"
};
// ==========================================================

const DEFAULT_TIMER = 20;
const SHAPES = ["▲","◆","●","■","★","▼"];
const COLORS = ["c0","c1","c2","c3","c4","c5"];
const CHIP_COLORS = ["#e63946","#457b9d","#f4a261","#2a9d8f","#8b5cf6","#ec4899"];

const SAMPLE_QUESTIONS = [
  {q:"Quelles sont les actions des filtres sur le respirateur ?",type:"multi",options:["Prévenir les infections croisées","Filtrer bactéries / virus","Protéger le ventilateur","Conditionner les gaz"],answers:[0,1,2,3]},
  {q:"Le filtre carré de la branche inspi du GE se change tous les 2 mois",type:"vf",options:["Vrai","Faux"],answers:[0]},
  {q:"Dans quel cas mettre un humidificateur ?",type:"multi",options:["Pathologies respiratoires","Ventilation invasive longue","ACR"],answers:[0,1]},
  {q:"Pourquoi mettre un humidificateur ?",type:"multi",options:["Débits importants","Confort du patient","Diminuer risque Barotraumatisme","Éviter dessèchement muqueuse respi"],answers:[0,1,3]},

];

let db = null;
let gameRef = null, playersRef = null;
let timerInterval = null, currentTimer = 20, currentTimerTotal = 20;
let lastPlayersJSON = "";
let isProcessingTimerEnd = false;

let S = {
  screen:"home", error:"", msg:"",
  // Admin
  adminPw:"", banks:[], currentBank:null, editQ:[], categoryFilter:"all",
  // Game
  gameCode:"", gs:null, players:[], role:null,
  // Player
  playerName:"", joinCode:"", selectedAnswers:[], answered:false,
  // Detail results
  detailData:null, detailTab:"questions",
  // Import
  importText:"",
  // Solo mode
  solo:null, // {questions, currentQ, score, answers:[], timerSec}
  soloSel:[], soloAnswered:false,
};

function setState(p){ Object.assign(S,p); render(); }
function mkCode(){ return Math.random().toString(36).substring(2,8).toUpperCase(); }
function mkId(){ return Date.now().toString(36)+Math.random().toString(36).substring(2,6); }
function esc(s){ const d=document.createElement("div");d.textContent=s;return d.innerHTML; }

// ============ FIREBASE ============
function initFirebase(){
  if(!FIREBASE_CONFIG.apiKey){ setState({screen:"config"}); return false; }
  try{ firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); return true; }
  catch(e){ setState({screen:"config",error:"Erreur: "+e.message}); return false; }
}

// ============ ADMIN: Password ============
async function checkAdminSetup(){
  const snap = await db.ref("admin/password").once("value");
  return snap.val();
}
async function setAdminPassword(pw){
  await db.ref("admin/password").set(pw);
}
async function doAdminLogin(){
  const pw = S.adminPw.trim();
  if(!pw){ setState({error:"Entre le mot de passe !"}); return; }
  const stored = await checkAdminSetup();
  if(!stored){
    // First time: set password
    await setAdminPassword(pw);
    setState({screen:"admin-dash",error:"",msg:""});
    loadBanks();
  } else if(stored === pw){
    setState({screen:"admin-dash",error:"",msg:""});
    loadBanks();
  } else {
    setState({error:"Mot de passe incorrect !"});
  }
}

// ============ ADMIN: Question Banks ============
const DEFAULT_CATEGORIES = ["🚒 Pompier","🏥 Infirmier","📚 Autre"];

// ============ SHUFFLE ============
function shuffleArray(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function shuffleQuestion(q){
  // Shuffle options and remap answer indices
  const indices = q.options.map((_,i)=>i);
  const shuffled = shuffleArray(indices);
  const newOptions = shuffled.map(i=>q.options[i]);
  const newAnswers = q.answers.map(a=>shuffled.indexOf(a));
  return {...q, options:newOptions, answers:newAnswers};
}
function shuffleQuiz(questions){
  return shuffleArray(questions).map(q=>q.type==="vf"?q:shuffleQuestion(q));
}

// ============ ADMIN: Launch Game ============
async function launchGame(bankId){
  const snap = await db.ref("banks/"+bankId).once("value");
  const bank = snap.val();
  if(!bank||!bank.questions?.length){ setState({error:"Ce quiz n'a pas de questions !"}); return; }
  const code = mkCode();
  const rawQs = bank.questions.filter(q=>q.q.trim()&&q.options.every(o=>o.trim()));
  if(!rawQs.length){ setState({error:"Ce quiz n'a pas de questions valides !"}); return; }
  const qs = shuffleQuiz(rawQs);
  const timerSec = bank.timerSeconds || DEFAULT_TIMER;
  await db.ref("games/"+code).set({
    state:{status:"lobby",currentQ:0,totalQ:qs.length,questions:qs,bankName:bank.name,timerSeconds:timerSec},
    players:{}
  });
  setState({gameCode:code,role:"host",screen:"host-lobby",error:""});
  listenGame(code);
}

// ============ GAME: Firebase listeners ============
function listenGame(code){
  stopListening();
  gameRef = db.ref("games/"+code+"/state");
  playersRef = db.ref("games/"+code+"/players");
  gameRef.on("value",snap=>{
    const g=snap.val(); if(!g)return;
    const prev=S.gs; S.gs=g;
    if(g.status==="question"&&(prev?.status!=="question"||prev?.currentQ!==g.currentQ)){
      // Show 3-2-1 countdown before question
      showCountdown(()=>{
        // Verify game is still in "question" status (could have changed during countdown)
        if(!S.gs || S.gs.status!=="question") return;
        if(S.role==="host"){setState({screen:"host-q"});startTimer(true);}
        else{setState({screen:"play-q",selectedAnswers:[],answered:false});startTimer(false);}
      });
    }else if(g.status==="results"&&prev?.status!=="results"){
      stopTimer();stopCountdown();setState({screen:S.role==="host"?"host-r":"play-w"});
    }else if(g.status==="final"&&prev?.status!=="final"){
      stopTimer();stopCountdown();setState({screen:S.role==="host"?"host-f":"play-f"});
      if(S.role==="host")saveGameHistory();
    }
    // Don't re-render during questions — timer handles its own updates
  });
  playersRef.on("value",snap=>{
    const p=snap.val();S.players=p?Object.values(p):[];
    S.players.sort((a,b)=>b.score-a.score);
    const json=JSON.stringify(S.players);
    // Only re-render if players actually changed AND we're on a screen that shows them
    if(json!==lastPlayersJSON){
      lastPlayersJSON=json;
      const scr=S.screen;
      if(scr==="host-lobby"||scr==="host-r"||scr==="host-f"||scr==="play-f"||scr==="play-w") render();
    }
  });
}
function stopListening(){
  if(gameRef){gameRef.off();gameRef=null;}
  if(playersRef){playersRef.off();playersRef=null;}
  stopTimer();
  stopCountdown();
}

// ============ TIMER ============
function getTimerDuration(){
  // Use bank timer if set, else default 20s
  if(S.gs && S.gs.timerSeconds) return S.gs.timerSeconds;
  return 20;
}
function startTimer(isHost){
  stopTimer();
  const dur = getTimerDuration();
  currentTimer = dur;
  currentTimerTotal = dur;
  render();
  timerInterval=setInterval(()=>{
    currentTimer--;
    updateTimerDOM();
    if(currentTimer<=0){stopTimer();if(isHost)doTimerEnd();}
    else if(isHost && currentTimer % 2 === 0) checkAllAnswered(); // check every 2 sec
  },1000);
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}

// ============ COUNTDOWN 3-2-1 ============
let countdownCallback = null;
let countdownInterval = null;
function stopCountdown(){if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}countdownCallback=null;}
function showCountdown(callback){
  stopCountdown();
  countdownCallback = callback;
  setState({screen:"countdown"});
  let count = 3;
  const root = document.getElementById("app");
  function renderCount(){
    const colors = ["#4ade80","#fbbf24","#f87171"];
    const c = colors[3-count] || "#4ade80";
    const text = count > 0 ? count : "GO !";
    const size = count > 0 ? "6rem" : "4rem";
    root.className = "app";
    root.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-size:${size};font-weight:900;color:${c};font-family:'Outfit',sans-serif;
        text-shadow:0 0 60px ${c}44,0 0 120px ${c}22;
        animation:countPop .5s ease both">${text}</div>
      ${S.gs?`<p style="color:var(--muted);font-size:13px;margin-top:20px">Question ${S.gs.currentQ+1}/${S.gs.totalQ}</p>`:""}
    </div>
    <style>@keyframes countPop{0%{transform:scale(2.5);opacity:0}40%{transform:scale(.9);opacity:1}100%{transform:scale(1);opacity:1}}</style>`;
  }
  renderCount();
  countdownInterval = setInterval(()=>{
    count--;
    if(count < 0){
      stopCountdown();
      if(callback) callback();
    } else {
      renderCount();
    }
  }, 800);
}
function updateTimerDOM(){
  const bar = document.getElementById("timer-fill");
  const num = document.getElementById("timer-num");
  const circle = document.getElementById("timer-circle");
  const circleNum = document.getElementById("timer-circle-num");
  if(!bar && !circle) return;
  const dur = currentTimerTotal || 20;
  const pct = (currentTimer/dur)*100;
  const c = currentTimer<=3?"#f87171":currentTimer<=7?"#fbbf24":"#4ade80";
  const glow = currentTimer<=3?"rgba(248,113,113,.3)":currentTimer<=7?"rgba(251,191,36,.2)":"rgba(74,222,128,.2)";
  if(bar){bar.style.width=pct+"%";bar.style.background=c;}
  if(num){num.style.color=c;num.textContent=currentTimer;}
  if(circle){
    const circ = 2*Math.PI*54;
    const offset = circ * (1 - currentTimer/dur);
    circle.style.strokeDashoffset = offset;
    circle.style.stroke = c;
    circle.parentElement.style.filter = "drop-shadow(0 0 20px "+glow+")";
  }
  if(circleNum){circleNum.textContent=currentTimer;circleNum.style.fill=c;}
}

// Check if all players answered (called from timer tick)
async function checkAllAnswered(){
  if(!S.gs || S.screen !== "host-q") return;
  try{
    const snap = await db.ref("games/"+S.gameCode+"/answers/"+S.gs.currentQ).once("value");
    const ans = snap.val() ? Object.keys(snap.val()).length : 0;
    const total = S.players.length;
    // Update the answered counter in DOM
    const counter = document.getElementById("ans-counter");
    if(counter) counter.textContent = ans + "/" + total;
    if(total > 0 && ans >= total){
      // Everyone answered — auto skip
      doSkipQuestion();
    }
  }catch(e){}
}
async function doTimerEnd(){
  if(isProcessingTimerEnd) return;
  isProcessingTimerEnd = true;
  try{
  const g=S.gs;if(!g){isProcessingTimerEnd=false;return;}
  const snap=await db.ref("games/"+S.gameCode+"/answers/"+g.currentQ).once("value");
  const answers=Object.values(snap.val()||{});
  const dur=g.timerSeconds||DEFAULT_TIMER;
  const cSet=new Set(g.questions[g.currentQ].answers);
  const isM=g.questions[g.currentQ].type==="multi";
  const plSnap=await db.ref("games/"+S.gameCode+"/players").once("value");
  const raw=plSnap.val()||{};
  for(const[k,p]of Object.entries(raw)){
    const a=answers.find(x=>x.name===p.name);
    p.lastCorrect=false;p.lastPartial=false;
    if(!a)continue;
    const chosen=new Set(a.choices||[]);
    if(isM){
      const allOk=[...cSet].every(c=>chosen.has(c));
      const noWrong=[...chosen].every(c=>cSet.has(c));
      if(allOk&&noWrong){p.score=(p.score||0)+1000+Math.round((a.timeLeft/dur)*500);p.lastCorrect=true;}
      else{const pt=Math.max(0,Math.round(([...chosen].filter(c=>cSet.has(c)).length/cSet.size)*500));p.score=(p.score||0)+pt;p.lastPartial=pt>0;}
    }else{
      if(cSet.has(a.choices?.[0])){p.score=(p.score||0)+1000+Math.round((a.timeLeft/dur)*500);p.lastCorrect=true;}
    }
  }
  await db.ref("games/"+S.gameCode+"/players").set(raw);
  await db.ref("games/"+S.gameCode+"/state").update({status:"results"});
  }catch(e){console.error("doTimerEnd error:",e);}
  finally{isProcessingTimerEnd=false;}
}
async function doNext(){
  const next=S.gs.currentQ+1;
  if(next>=S.gs.totalQ){await db.ref("games/"+S.gameCode+"/state").update({status:"final"});}
  else{await db.ref("games/"+S.gameCode+"/answers/"+next).remove();await db.ref("games/"+S.gameCode+"/state").update({status:"question",currentQ:next});}
}

// ============ PLAYER ACTIONS ============
async function doJoin(){
  const code=S.joinCode.toUpperCase().trim();
  const name=S.playerName.trim();
  if(!code||!name){setState({error:"Remplis le code et ton pseudo !"});return;}
  try{
    const snap=await db.ref("games/"+code+"/state").once("value");
    const g=snap.val();
    if(!g){setState({error:"Partie introuvable !"});return;}
    if(g.status!=="lobby"){setState({error:"Déjà commencé !"});return;}
    const plSnap=await db.ref("games/"+code+"/players").once("value");
    const raw=plSnap.val()||{};
    if(Object.values(raw).find(p=>p.name===name)){setState({error:"Pseudo déjà pris !"});return;}
    await db.ref("games/"+code+"/players").push({name,score:0,lastCorrect:false,lastPartial:false});
    setState({gameCode:code,role:"player",playerName:name,screen:"play-lobby",error:""});
    listenGame(code);
  }catch(e){setState({error:"Erreur: "+e.message});}
}
function doToggle(idx){
  if(S.answered)return;
  const q=S.gs.questions[S.gs.currentQ];
  if(q.type==="multi"){
    if(S.selectedAnswers.includes(idx)) S.selectedAnswers=S.selectedAnswers.filter(i=>i!==idx);
    else S.selectedAnswers=[...S.selectedAnswers, idx];
    // Update DOM directly instead of full re-render (avoids timer jump)
    document.querySelectorAll("[data-ans]").forEach(el=>{
      const i=+el.dataset.ans;
      const isSel=S.selectedAnswers.includes(i);
      el.classList.toggle("selected",isSel);
      el.classList.remove("faded");
    });
    const vb=document.getElementById("btn-val");
    if(vb){
      vb.disabled=!S.selectedAnswers.length;
      vb.textContent="Valider ("+S.selectedAnswers.length+")";
    }
  }else{
    S.selectedAnswers=[idx];
    doSubmit([idx]);
    // doSubmit calls setState({answered:true}) which triggers render with correct state
  }
}
async function doSubmit(choices){
  if(S.answered)return;
  S.answered=true;
  // Update DOM directly to show "Envoyé" without re-rendering (avoids timer jump)
  document.querySelectorAll("[data-ans]").forEach(el=>{
    const i=+el.dataset.ans;
    const isSel=choices.includes(i);
    el.classList.toggle("selected",isSel);
    el.classList.toggle("faded",!isSel);
    el.disabled=true;
    el.style.pointerEvents="none";
  });
  const valBtn=document.getElementById("btn-val");
  if(valBtn) valBtn.style.display="none";
  // Add "Envoyé" message
  const answersDiv=document.querySelector(".answers");
  if(answersDiv){
    const msg=document.createElement("p");
    msg.style.cssText="color:var(--green);margin-top:14px;font-weight:700;font-size:14px;text-align:center;width:100%;grid-column:1/-1";
    msg.textContent="✓ Envoyé !";
    answersDiv.parentElement.appendChild(msg);
  }
  await db.ref("games/"+S.gameCode+"/answers/"+S.gs.currentQ).push({name:S.playerName,choices,timeLeft:currentTimer});
}

// ============ EDITOR HELPERS ============
function eQ(qi,f,v){
  if(f==="q")S.editQ[qi].q=v;
  else if(f==="type"){S.editQ[qi].type=v;if(v==="vf"){S.editQ[qi].options=["Vrai","Faux"];S.editQ[qi].answers=[0];}else if(S.editQ[qi].options.length<3){S.editQ[qi].options=["","","",""];S.editQ[qi].answers=[0];}}
  else if(f.startsWith("opt"))S.editQ[qi].options[parseInt(f.replace("opt",""))]=v;
  else if(f==="tog"){const ai=parseInt(v);const q=S.editQ[qi];if(q.type==="multi")q.answers=q.answers.includes(ai)?q.answers.filter(a=>a!==ai):[...q.answers,ai];else q.answers=[ai];}
  render();
}

function startSolo(bankId){
  const bank = S.banks.find(b=>b.id===bankId);
  if(!bank||!bank.questions?.length){ setState({error:"Pas de questions !"}); return; }
  const rawQs = bank.questions.filter(q=>q.q.trim()&&q.options.every(o=>o.trim()));
  if(!rawQs.length){ setState({error:"Pas de questions valides !"}); return; }
  const qs = shuffleQuiz(rawQs);
  const timerSec = bank.timerSeconds || DEFAULT_TIMER;
  S.solo = {questions:qs, currentQ:0, score:0, results:[], bankName:bank.name, bankId:bankId, timerSec};
  S.soloSel = []; S.soloAnswered = false;
  showSoloCountdown(()=>{
    setState({screen:"solo-q", soloSel:[], soloAnswered:false, error:""});
    startSoloTimer();
  });
}

let soloTimerInterval = null, soloTimer = 20;
function startSoloTimer(){
  stopSoloTimer();
  soloTimer = S.solo?.timerSec || DEFAULT_TIMER;
  soloTimerInterval = setInterval(()=>{
    soloTimer--;
    // Update timer DOM
    const circle = document.getElementById("timer-circle");
    const circleNum = document.getElementById("timer-circle-num");
    const dur = S.solo?.timerSec || DEFAULT_TIMER;
    const c = soloTimer<=3?"#f87171":soloTimer<=7?"#fbbf24":"#4ade80";
    const glow = soloTimer<=3?"rgba(248,113,113,.3)":soloTimer<=7?"rgba(251,191,36,.2)":"rgba(74,222,128,.2)";
    if(circle){
      const circ = 2*Math.PI*54;
      circle.style.strokeDashoffset = circ*(1-soloTimer/dur);
      circle.style.stroke = c;
      circle.parentElement.style.filter = "drop-shadow(0 0 20px "+glow+")";
    }
    if(circleNum){circleNum.textContent=soloTimer;circleNum.style.fill=c;}
    if(soloTimer<=0){
      stopSoloTimer();
      if(!S.soloAnswered) soloSubmit(S.soloSel);
    }
  },1000);
}
function stopSoloTimer(){if(soloTimerInterval){clearInterval(soloTimerInterval);soloTimerInterval=null;}}

function soloToggle(idx){
  if(S.soloAnswered) return;
  const q = S.solo.questions[S.solo.currentQ];
  if(q.type==="multi"){
    const sel = S.soloSel.includes(idx) ? S.soloSel.filter(i=>i!==idx) : [...S.soloSel, idx];
    S.soloSel = sel;
    // Update DOM
    document.querySelectorAll("[data-ans]").forEach(el=>{
      el.classList.toggle("selected", sel.includes(+el.dataset.ans));
    });
    const vb = document.getElementById("btn-solo-val");
    if(vb){vb.disabled=!sel.length;vb.textContent="Valider ("+sel.length+")";}
  } else {
    S.soloSel = [idx];
    soloSubmit([idx]);
  }
}

function soloSubmit(choices){
  if(S.soloAnswered) return;
  S.soloAnswered = true;
  stopSoloTimer();
  const q = S.solo.questions[S.solo.currentQ];
  const cSet = new Set(q.answers);
  const chosen = new Set(choices);
  const isM = q.type==="multi";
  
  let status = "wrong", points = 0;
  if(isM){
    const allOk = [...cSet].every(c=>chosen.has(c));
    const noWrong = [...chosen].every(c=>cSet.has(c));
    if(allOk && noWrong){ status="correct"; points=1000+Math.round((soloTimer/(S.solo.timerSec||20))*500); }
    else {
      const partial = [...chosen].filter(c=>cSet.has(c)).length;
      if(partial>0){ status="partial"; points=Math.round((partial/cSet.size)*500); }
    }
  } else {
    if(cSet.has(choices[0])){ status="correct"; points=1000+Math.round((soloTimer/(S.solo.timerSec||20))*500); }
  }
  
  S.solo.score += points;
  S.solo.results.push({q:q.q, choices, status, points, correct:q.answers, options:q.options, type:q.type});
  
  setState({screen:"solo-result", soloAnswered:true});
}

}

// ============ IMPORT PARSER ============
function parseImportText(text){
  // Normalize line endings
  text = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines = text.split("\n");
  
  // Step 1: Identify question start lines
  function isQuestionStart(line, prevLine){
    let trimmed = line.trim();
    if(!trimmed) return false;
    // Strip leading markdown bold ** or __
    trimmed = trimmed.replace(/^\*{1,2}\s*/, "").replace(/^_{1,2}\s*/, "");
    // Strip leading ### markdown headers
    trimmed = trimmed.replace(/^#{1,4}\s*/, "");
    // Skip meta-lines that should never be questions
    if(/^(explication|note|réponse|answer|explanation|correct|source|astuce|rappel|nb|remarque)\s*[:—\-]/i.test(trimmed)) return false;
    // Numbered: "1.", "1)", "1 -", "1:", "1 " followed by text
    if(/^\d+\s*[).\-:]\s*\S/.test(trimmed)) return true;
    if(/^\d+\s+[A-ZÀ-ÖÙ-Ü]/u.test(trimmed)) return true;  // "1 Quelle..."
    // Q1:, Q1., Q1), Question 1
    if(/^Q(uestion)?\s*\d+\s*[).\-:]/i.test(trimmed)) return true;
    if(/^Q(uestion)?\s*\d+\s*$/i.test(trimmed)) return true;  // "Question 1" alone
    if(/^Q(uestion)?\s*[).\-:]/i.test(trimmed)) return true;  // "Q:", "Question-"
    // After blank line AND line doesn't look like an answer
    if(prevLine !== undefined && prevLine.trim() === ""){
      if(!/^[a-f]\s*[.)]/i.test(trimmed) && !/^[-•*✓✅☑\[]/.test(trimmed)){
        // Also skip meta-lines after blank lines
        if(!/^(explication|note|réponse|answer|explanation|correct|source|astuce|rappel|nb|remarque)\s*[:—\-]/i.test(trimmed)){
          return true;
        }
      }
    }
    return false;
  }
  
  function isAnswerLine(line){
    let t = line.trim();
    if(!t) return false;
    // Strip leading DOUBLE bold only (** but not single *)
    t = t.replace(/^\*\*\s*/, "");
    // a), A., b), B. etc
    if(/^[a-f]\s*[.)]/i.test(t)) return true;
    // - or • bullet
    if(/^[-•]/.test(t)) return true;
    // * as correct answer marker (single star)
    if(/^\*\s*\S/.test(t)) return true;
    // Correct markers
    if(/^[✓✅☑]/.test(t)) return true;
    if(/^\[[ x]\]/i.test(t)) return true;
    return false;
  }
  
  function isMetaLine(line){
    const t = line.trim().replace(/^\*{1,2}/, "").trim();
    if(/^(réponse|answer)\s*(correcte|correct)?\s*[:—\-]/i.test(t)) return true;
    if(/^(note|correct|source|rappel|nb|remarque)\s*[:—\-]/i.test(t)) return true;
    return false;
  }
  function isExplLine(line){
    const t = line.trim().replace(/^\*{1,2}/, "").trim();
    if(/^(explication|explanation|justification|astuce)\s*[:—\-]/i.test(t)) return true;
    return false;
  }
  function cleanExpl(line){
    return line.trim().replace(/^\*{1,2}\s*/, "").replace(/^(explication|explanation|justification|astuce)\s*[:—\-]\s*/i, "").replace(/\*{1,2}\s*$/, "").trim();
  }
  
  // Step 2: Split into blocks (each block = 1 question + its answers + optional explanation)
  const blocks = [];
  let currentBlock = [];
  let currentExpl = "";
  let lastLineWasBlank = true;
  
  for(let i = 0; i < lines.length; i++){
    const line = lines[i];
    const trimmed = line.trim();
    const prevLine = i > 0 ? lines[i-1] : "";
    
    if(trimmed === ""){
      lastLineWasBlank = true;
      continue;
    }
    
    // Skip non-explanation meta-lines
    if(isMetaLine(trimmed)){
      lastLineWasBlank = false;
      continue;
    }
    
    // Capture explanation lines
    if(isExplLine(trimmed)){
      currentExpl = cleanExpl(trimmed);
      lastLineWasBlank = false;
      continue;
    }
    
    // Check if this line starts a new question
    if(isQuestionStart(line, lastLineWasBlank ? "" : undefined)){
      if(currentBlock.length >= 2){
        blocks.push({lines:[...currentBlock], expl:currentExpl});
      }
      currentBlock = [trimmed];
      currentExpl = "";
    } else if(isAnswerLine(line) && currentBlock.length >= 1){
      currentBlock.push(trimmed);
    } else if(currentBlock.length >= 1 && !lastLineWasBlank){
      if(currentBlock.length === 1){
        currentBlock[0] += " " + trimmed;
      } else {
        currentBlock.push(trimmed);
      }
    } else if(lastLineWasBlank && trimmed){
      if(currentBlock.length >= 2){
        blocks.push({lines:[...currentBlock], expl:currentExpl});
      }
      currentBlock = [trimmed];
      currentExpl = "";
    } else {
      currentBlock.push(trimmed);
    }
    
    lastLineWasBlank = false;
  }
  if(currentBlock.length >= 2){
    blocks.push({lines:currentBlock, expl:currentExpl});
  }
  
  // Step 3: Parse each block into a question object
  const questions = [];
  for(const block of blocks){
    let qText = block.lines[0];
    // Strip markdown formatting first
    qText = qText.replace(/^\*{1,2}\s*/, "").replace(/\*{1,2}\s*$/, ""); // **bold**
    qText = qText.replace(/^_{1,2}\s*/, "").replace(/_{1,2}\s*$/, ""); // __bold__
    qText = qText.replace(/^#{1,4}\s*/, ""); // ### headers
    // Clean numbering prefixes (only if content follows)
    const origQ = qText;
    qText = qText.replace(/^\d+\s*[).\-:]\s*/, "");  // "1. ", "1) ", "1: "
    qText = qText.replace(/^\d+\s+(?=[A-ZÀ-ÖÙ-Üa-zà-öù-ü])/u, "");  // "1 Quelle" → "Quelle"
    qText = qText.replace(/^Q(uestion)?\s*\d+\s*[).\-:]\s*/i, "");  // "Q1. ", "Question 3: "
    qText = qText.replace(/^Q(uestion)?\s*\d*\s*[).\-:]\s*/i, "");  // "Q: ", "Question: "
    // Don't strip "Question X" if it would leave nothing (it IS the question text)
    if(qText.trim()) {
      // Additional cleanup only if we still have text
    } else {
      qText = origQ; // restore original if cleaning emptied it
    }
    // Clean remaining bold markers in the middle
    qText = qText.replace(/\*{1,2}/g, "");
    qText = qText.trim();
    if(!qText) continue;
    
    const options = [];
    const answers = [];
    
    for(let i = 1; i < block.lines.length; i++){
      let line = block.lines[i];
      let isCorrect = false;
      
      // Skip meta-lines inside blocks too
      if(isMetaLine(line)) continue;
      
      // Detect correct answer markers (check BEFORE cleaning)
      // Strip prefix first to check for * after "a) " etc
      const lineAfterPrefix = line.replace(/^\s*[a-f]\s*[.)]\s*/i,"").replace(/^\s*\d+\s*[.)]\s*/,"").replace(/^\s*[-•–—]\s*/,"");
      if(/^\s*\*\s*[^*]/.test(lineAfterPrefix) || /^\s*\*\*\s*[^*]/.test(lineAfterPrefix)){
        isCorrect = true;
      }
      if(/^\s*\*\s*[^*]/.test(line) || /^\s*\*\*\s*[^*]/.test(line)){
        isCorrect = true;
      }
      if(/✓/.test(line) || /✅/.test(line) || /☑/.test(line)){
        isCorrect = true;
      }
      if(/^\s*\[x\]/i.test(line)){
        isCorrect = true;
      }
      if(/\(correct[e]?\)/i.test(line) || /\(bonne\s*r[ée]ponse\)/i.test(line)){
        isCorrect = true;
      }
      
      // Clean the line
      line = line.replace(/^\s*[a-f]\s*[.)]\s*/i, ""); // remove letter prefix first
      line = line.replace(/^\s*\d+\s*[.)]\s*/, ""); // remove number prefix
      line = line.replace(/^\s*[-•–—]\s*/, ""); // remove dash prefix
      line = line.replace(/^\s*\*{1,2}\s*/, ""); // leading * or **
      line = line.replace(/\*{1,2}\s*$/, ""); // trailing **
      line = line.replace(/^\s*[✓✅☑]\s*/, "");
      line = line.replace(/^\s*\[[ x]\]\s*/i, "");
      line = line.replace(/\s*\(correct[e]?\)\s*/i, "");
      line = line.replace(/\s*\(bonne\s*r[ée]ponse\)\s*/i, "");
      line = line.replace(/\s*[✓✅]\s*$/, "");
      line = line.replace(/\s+\*\s*$/, "");
      // Clean any remaining bold markers
      line = line.replace(/\*{1,2}/g, "");
      line = line.replace(/_{1,2}/g, "");
      line = line.trim();
      
      if(!line) continue;
      if(line.length > 200) continue;
      
      if(isCorrect) answers.push(options.length);
      options.push(line);
    }
    
    if(options.length < 2) continue;
    
    // Determine type
    let type = "single";
    const isVF = options.length === 2 && 
      ((options[0].match(/^vrai$/i) && options[1].match(/^faux$/i)) ||
       (options[0].match(/^true$/i) && options[1].match(/^false$/i)));
    if(isVF) type = "vf";
    else if(answers.length > 1) type = "multi";
    
    if(answers.length === 0) answers.push(0);
    questions.push({ q: qText, type, options, answers, expl: block.expl || "" });
  }
  return questions;
}

function doImport(){
  const parsed = parseImportText(S.importText);
  if(!parsed.length){
    setState({error: "Aucune question détectée. Vérifie le format !"});

  S.editQ = [...S.editQ, ...parsed];

  setTimeout(()=>setState({msg:""}), 3000);

// ============ DETAILED RESULTS ============
async function loadDetailedResults(){
  if(!S.gs||!S.gameCode)return;
  const qs=S.gs.questions;
  const totalQ=qs.length;
  const allAnswers=[];
  for(let i=0;i<totalQ;i++){
    try{
      const snap=await db.ref("games/"+S.gameCode+"/answers/"+i).once("value");
      allAnswers.push(Object.values(snap.val()||{}));
    }catch{allAnswers.push([]);}
  }
  // Build per-question stats
  const qStats=qs.map((q,qi)=>{
    const ans=allAnswers[qi]||[];
    const cSet=new Set(q.answers);
    const isM=q.type==="multi";
    const playerResults=S.players.map(p=>{
      const a=ans.find(x=>x.name===p.name);
      if(!a)return{name:p.name,status:"missed",choices:[]};
      const chosen=new Set(a.choices||[]);
      if(isM){
        const allOk=[...cSet].every(c=>chosen.has(c));
        const noWrong=[...chosen].every(c=>cSet.has(c));
        if(allOk&&noWrong)return{name:p.name,status:"correct",choices:a.choices};
        const hasPartial=[...chosen].some(c=>cSet.has(c));
        return{name:p.name,status:hasPartial?"partial":"wrong",choices:a.choices};
      }else{
        return{name:p.name,status:cSet.has(a.choices?.[0])?"correct":"wrong",choices:a.choices};
      }
    });
    const nCorrect=playerResults.filter(r=>r.status==="correct").length;
    const pct=S.players.length?Math.round((nCorrect/S.players.length)*100):0;
    return{q:q.q,type:q.type,options:q.options,answers:q.answers,playerResults,nCorrect,pct};
  });
  // Build per-player stats
  const pStats=S.players.map(p=>{
    let correct=0,partial=0;
    qStats.forEach(qs=>{
      const r=qs.playerResults.find(x=>x.name===p.name);
      if(r?.status==="correct")correct++;
      else if(r?.status==="partial")partial++;
    });
    return{name:p.name,score:p.score,correct,partial,total:totalQ,pct:Math.round((correct/totalQ)*100)};
  });
  setState({detailData:{qStats,pStats},screen:S.role==="host"?"host-detail":"play-detail"});
}

      <h1 class="winner-name mt-8">${esc(w?.name||"—")}</h1>
      <p style="color:#94a3b8;margin:6px 0">remporte la partie !</p>
      ${S.screen==="play-f"&&me?`<p style="color:#c084fc;font-weight:700;margin-bottom:20px">${medal} — ${me.score} pts</p>`:""}
      <div class="board mt-16">${boardHTML(S.playerName)}</div>
      <div style="display:flex;gap:10px;margin-top:24px;max-width:380px;width:100%;flex-wrap:wrap">
        <button class="btn btn-outline" id="btn-detail" style="flex:1;min-width:120px">📊 Détail</button>
        ${S.role==="host"?`<button class="btn btn-amber" id="btn-replay" style="flex:1;min-width:120px">🔄 Relancer</button>`:""}
        <button class="btn btn-purple" id="btn-end" style="flex:1;min-width:120px">${S.role==="host"?"📚 Mes quiz":"🔄 Rejouer"}</button>
      </div>
    </div>`;
    document.getElementById("btn-detail").onclick=loadDetailedResults;
    document.getElementById("btn-end").onclick=S.role==="host"?doBackToDash:doReset;
    const replay=document.getElementById("btn-replay");
    if(replay) replay.onclick=doRestartQuiz;
    return;
  }

  // HOST/PLAYER DETAIL RESULTS
  if((S.screen==="host-detail"||S.screen==="play-detail")&&S.detailData){
    root.className="scroll-page";
    const d=S.detailData;
    const isHost=S.screen==="host-detail";
    const tab=S.detailTab||"questions";

    // Tabs
    let content="";
    if(tab==="questions"){
      content=d.qStats.map((qs,qi)=>{
        const barColor=qs.pct>=70?"var(--green)":qs.pct>=40?"var(--amber)":"var(--red)";
        const correctOpts=qs.answers.map(ai=>`<span style="color:var(--green)">${SHAPES[ai]||"◆"} ${esc(qs.options[ai])}</span>`).join(", ");
        const playersHTML=qs.playerResults.map(r=>{
          const cls=r.status==="correct"?"ok":r.status==="partial"?"partial":"ko";
          const icon=r.status==="correct"?"✓":r.status==="partial"?"~":"✗";
          return `<span class="detail-chip ${cls}">${icon} ${esc(r.name)}</span>`;
        }).join("");
        return `<div class="detail-q">
          <div class="detail-q-head">
            <span class="detail-q-num">Q${qi+1}</span>
            <span class="detail-q-text">${esc(qs.q)}</span>
            <span class="detail-pct" style="color:${barColor}">${qs.pct}%</span>
          </div>
          <div class="detail-bar"><div class="detail-bar-fill" style="width:${qs.pct}%;background:${barColor}"></div></div>
          <div class="detail-correct">✓ ${correctOpts}</div>
          <div class="detail-players">${playersHTML}</div>
        </div>`;
      }).join("");
    } else {
      // Per-player tab
      content=d.pStats.map((ps,i)=>{
        const barColor=ps.pct>=70?"var(--green)":ps.pct>=40?"var(--amber)":"var(--red)";
        const medal=i===0?"🥇 ":i===1?"🥈 ":i===2?"🥉 ":"";
        return `<div class="player-stat">
          <div>
            <div class="player-stat-name">${medal}${esc(ps.name)}</div>
            <div style="font-size:12px;color:var(--muted)">${ps.correct}/${ps.total} correct${ps.partial?` · ${ps.partial} partiel`:""} · ${ps.score} pts</div>
          </div>
          <div class="player-stat-bar"><div class="player-stat-fill" style="width:${ps.pct}%;background:${barColor}"></div></div>
          <span class="player-stat-pct" style="color:${barColor}">${ps.pct}%</span>
        </div>`;
      }).join("");
    }

    // Global stats
    const avgPct=d.qStats.length?Math.round(d.qStats.reduce((a,q)=>a+q.pct,0)/d.qStats.length):0;
    const hardest=d.qStats.reduce((min,q)=>q.pct<min.pct?q:min,d.qStats[0]);
    const easiest=d.qStats.reduce((max,q)=>q.pct>max.pct?q:max,d.qStats[0]);

    root.innerHTML=`
      <div class="sticky-head">
        <div class="row">
          <button class="btn-ghost" id="btn-backfinal">← Podium</button>
          <h2 class="title" style="font-size:1.2rem">📊 <span>Résultats</span></h2>
          <div></div>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;justify-content:center">
        <div class="card center" style="flex:1;min-width:100px;padding:12px">
          <div class="mono" style="font-size:1.4rem;font-weight:800;color:${avgPct>=60?"var(--green)":"var(--amber)"}">${avgPct}%</div>
          <div style="font-size:11px;color:var(--muted)">Moyenne</div>
        </div>
        <div class="card center" style="flex:1;min-width:100px;padding:12px">
          <div class="mono" style="font-size:1.4rem;font-weight:800;color:var(--green)">${easiest.pct}%</div>
          <div style="font-size:11px;color:var(--muted)">+ Facile</div>
        </div>
        <div class="card center" style="flex:1;min-width:100px;padding:12px">
          <div class="mono" style="font-size:1.4rem;font-weight:800;color:var(--red)">${hardest.pct}%</div>
          <div style="font-size:11px;color:var(--muted)">+ Difficile</div>
        </div>
      </div>

      <div class="tab-row">
        <button class="tab-btn ${tab==="questions"?"active":""}" data-tab="questions">📝 Questions</button>
        <button class="tab-btn ${tab==="players"?"active":""}" data-tab="players">👥 Joueurs</button>
      </div>

      ${content}

      <div style="height:40px"></div>
    `;
    document.getElementById("btn-backfinal").onclick=()=>setState({screen:isHost?"host-f":"play-f"});
    root.querySelectorAll("[data-tab]").forEach(el=>el.onclick=()=>setState({detailTab:el.dataset.tab}));
    return;
  }

  // ============ SOLO MODE SCREENS ============

  // SOLO PICK (choose a quiz)
  if(S.screen==="solo-pick"){
    root.className="scroll-page";
    const cats = getCategories();
    const filter = S.categoryFilter || "all";
    const filtered = filter==="all" ? S.banks : S.banks.filter(b=>b.category===filter);
    const grouped = {};
    filtered.forEach(b=>{ const c=b.category||"📚 Autre"; if(!grouped[c])grouped[c]=[]; grouped[c].push(b); });

    const tabsHTML = `<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none">
      <button class="cat-tab ${filter==="all"?"active":""}" data-cat="all">Tout</button>
      ${cats.map(c=>{const n=S.banks.filter(b=>b.category===c).length;return n?`<button class="cat-tab ${filter===c?"active":""}" data-cat="${esc(c)}">${esc(c)}</button>`:""}).join("")}
    </div>`;

    let listHTML = "";
    for(const [cat, bks] of Object.entries(grouped).sort((a,b)=>a[0].localeCompare(b[0]))){
      listHTML += `<p style="color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:16px 0 8px 4px">${esc(cat)}</p>`;
      bks.forEach(b=>{
        const n = b.questions?.length||0;
        if(n===0) return;
        listHTML += `<div class="bank-item card-hover" data-solo="${b.id}" style="cursor:pointer">
          <div><div class="bank-name">${esc(b.name)}</div><div class="bank-count">${n} question${n!==1?"s":""}</div></div>
          <span style="color:var(--teal);font-size:1.2rem">▶</span>
        </div>`;
      });
    }
    if(!filtered.length) listHTML = '<div class="center" style="padding:40px"><p style="color:var(--muted)">Aucun quiz disponible</p></div>';

    root.innerHTML=`
      <div class="sticky-head">
        <div class="row mb-8">
          <button class="btn-ghost" id="btn-solo-back">← Retour</button>
          <h2 class="title" style="font-size:1.3rem">🎯 <span>Entraînement</span></h2>
          <div></div>
        </div>
        ${tabsHTML}
      </div>
      <p style="color:var(--muted);font-size:13px;text-align:center;margin-bottom:16px">Choisis un quiz pour t'entraîner</p>
      ${listHTML}
    `;
    document.getElementById("btn-solo-back").onclick=doReset;
    root.querySelectorAll(".cat-tab").forEach(el=>el.onclick=()=>setState({categoryFilter:el.dataset.cat}));
    root.querySelectorAll("[data-solo]").forEach(el=>el.onclick=()=>startSolo(el.dataset.solo));
    return;
  }

  // SOLO QUESTION
  if(S.screen==="solo-q"&&S.solo){
    root.className="app";
    const q=S.solo.questions[S.solo.currentQ];
    const isM=q.type==="multi";
    root.innerHTML=`<div class="fade-in center w100" style="max-width:540px">
      <div class="row mb-8" style="max-width:520px;margin:0 auto">
        <span class="mono" style="color:var(--muted);font-size:13px">${S.solo.currentQ+1}/${S.solo.questions.length}</span>
        ${isM?'<span class="badge badge-amber">MULTI</span>':""}
        <span class="mono" style="color:var(--amber);font-size:13px">${S.solo.score} pts</span>
      </div>
      ${soloTimerHTML()}
      <div class="card center mb-16 mt-12" style="padding:18px 16px;max-width:520px">
        <h2 style="font-size:1.15rem;line-height:1.5;font-weight:700">${esc(q.q)}</h2>
      </div>
      <div class="answers cols-2" style="max-width:520px;margin:0 auto">
        ${q.options.map((opt,i)=>{
          const base=q.options.length<=2?`vf${i}`:COLORS[i%COLORS.length];
          return `<button class="ans-btn ${base}" data-ans="${i}"><span class="shape">${SHAPES[i]||"◆"}</span> ${esc(opt)}</button>`;
        }).join("")}
      </div>
      ${isM?`<button class="btn btn-purple mt-16" id="btn-solo-val" disabled style="max-width:340px">Valider (0)</button>`:""}
      <button class="btn-ghost mt-12" id="btn-solo-quit">Quitter</button>
    </div>`;
    root.querySelectorAll("[data-ans]").forEach(el=>el.onclick=()=>soloToggle(+el.dataset.ans));
    const sv=document.getElementById("btn-solo-val");
    if(sv) sv.onclick=()=>soloSubmit(S.soloSel);
    document.getElementById("btn-solo-quit").onclick=()=>{stopSoloTimer();doReset();};
    return;
  }

  // SOLO RESULT (after each question)
  if(S.screen==="solo-result"&&S.solo){
    root.className="app";
    const res = S.solo.results[S.solo.results.length-1];
    const q = S.solo.questions[S.solo.currentQ];
    const emoji = res.status==="correct"?"🎉":res.status==="partial"?"🤏":"😬";
    const msg = res.status==="correct"?"Bravo !":res.status==="partial"?"Presque !":"Raté !";
    const clr = res.status==="correct"?"var(--green)":res.status==="partial"?"var(--amber)":"var(--red)";
    
    const optsHTML = q.options.map((opt,i)=>{
      const isCorrect = q.answers.includes(i);
      const wasChosen = res.choices.includes(i);
      let bg, border;
      if(isCorrect && wasChosen){ bg="rgba(74,222,128,.15)"; border="var(--green)"; }
      else if(isCorrect){ bg="rgba(74,222,128,.08)"; border="var(--green)"; }
      else if(wasChosen){ bg="rgba(248,113,113,.1)"; border="var(--red)"; }
      else { bg="var(--card)"; border="var(--border)"; }
      const icon = isCorrect?"✓":(wasChosen?"✗":"");
      const iconClr = isCorrect?"var(--green)":"var(--red)";
      return `<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;background:${bg};border:1px solid ${border};margin-bottom:6px">
        <span style="color:${iconClr};font-weight:800;font-size:14px;width:20px">${icon}</span>
        <span style="font-size:14px;font-weight:${isCorrect?700:500};color:${isCorrect?"var(--green)":"var(--text)"}">${esc(opt)}</span>
      </div>`;
    }).join("");

    root.innerHTML=`<div class="fade-in center" style="max-width:480px;width:100%">
      <div style="font-size:2.5rem;margin-bottom:6px">${emoji}</div>
      <h2 class="title" style="font-size:1.4rem;color:${clr}">${msg}</h2>
      <p style="color:var(--amber);font-weight:700;margin:4px 0 20px">+${res.points} pts — Total : ${S.solo.score}</p>
      <div class="card" style="padding:16px;margin-bottom:16px;text-align:left">
        <p style="font-weight:700;font-size:14px;margin-bottom:12px;color:var(--muted)">${esc(q.q)}</p>
        ${optsHTML}
      </div>
      <button class="btn btn-purple" id="btn-solo-next" style="max-width:340px">
        ${S.solo.currentQ+1>=S.solo.questions.length?"🏆 Résultats finaux":"➡️ Question suivante"}
      </button>
    </div>`;
    document.getElementById("btn-solo-next").onclick=soloNext;
    return;
  }

  // SOLO FINAL
  if(S.screen==="solo-final"&&S.solo){
    root.className="scroll-page";
    const total = S.solo.questions.length;
    const correct = S.solo.results.filter(r=>r.status==="correct").length;
    const partial = S.solo.results.filter(r=>r.status==="partial").length;
    const pct = Math.round((correct/total)*100);
    const grade = pct>=90?"🌟 Excellent !":pct>=70?"💪 Bien joué !":pct>=50?"📖 À revoir":pct>=30?"😬 Insuffisant":"🔴 À travailler !";

    const questionsHTML = S.solo.results.map((r,i)=>{
      const barC = r.status==="correct"?"var(--green)":r.status==="partial"?"var(--amber)":"var(--red)";
      const icon = r.status==="correct"?"✓":r.status==="partial"?"~":"✗";
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:6px">
        <span style="color:${barC};font-weight:800;font-size:16px;width:24px">${icon}</span>
        <span style="flex:1;font-size:13px;font-weight:600">${esc(r.q).substring(0,60)}${r.q.length>60?"...":""}</span>
        <span class="mono" style="color:var(--amber);font-size:12px">+${r.points}</span>
      </div>`;
    }).join("");

    const mistakes = S.solo.results.filter(r=>r.status!=="correct").length;

    root.innerHTML=`
      <div class="fade-in center" style="margin-bottom:20px">
        <div style="font-size:3rem;margin-bottom:8px">🏆</div>
        <h2 class="title" style="font-size:1.6rem">${esc(S.solo.bankName)}</h2>
        <p style="color:var(--muted);margin-top:4px">${grade}</p>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:20px;justify-content:center;flex-wrap:wrap">
        <div class="card center" style="flex:1;min-width:90px;padding:14px">
          <div class="mono" style="font-size:1.6rem;font-weight:900;color:${pct>=60?"var(--green)":"var(--amber)"}">${pct}%</div>
          <div style="font-size:11px;color:var(--muted)">Réussite</div>
        </div>
        <div class="card center" style="flex:1;min-width:90px;padding:14px">
          <div class="mono" style="font-size:1.6rem;font-weight:900;color:var(--green)">${correct}</div>
          <div style="font-size:11px;color:var(--muted)">Correct</div>
        </div>
        <div class="card center" style="flex:1;min-width:90px;padding:14px">
          <div class="mono" style="font-size:1.6rem;font-weight:900;color:var(--amber)">${S.solo.score}</div>
          <div style="font-size:11px;color:var(--muted)">Points</div>
        </div>
      </div>
      ${mistakes>0?`<button class="btn btn-red mb-16" id="btn-solo-redo" style="max-width:400px;margin:0 auto 16px">🔄 Refaire les ${mistakes} erreur${mistakes>1?"s":""}</button>`:""}
      <h3 style="font-size:14px;color:var(--muted);margin-bottom:10px">Détail des questions</h3>
      ${questionsHTML}
      <div style="display:flex;gap:10px;margin-top:20px;padding-bottom:30px">
        <button class="btn btn-amber" id="btn-solo-retry" style="flex:1">🔄 Tout refaire</button>
        <button class="btn btn-outline" id="btn-solo-other" style="flex:1">📚 Autre quiz</button>
        <button class="btn btn-purple" id="btn-solo-home" style="flex:1">🏠 Accueil</button>
      </div>
    `;
    const redoBtn = document.getElementById("btn-solo-redo");
    if(redoBtn) redoBtn.onclick = soloRedoMistakes;
    document.getElementById("btn-solo-retry").onclick=()=>{
      if(S.solo.bankId) startSolo(S.solo.bankId); else loadSoloBanks();
    };
    document.getElementById("btn-solo-other").onclick=loadSoloBanks;
    document.getElementById("btn-solo-home").onclick=doReset;
    return;
  }

  // PLAYER LOBBY
  if(S.screen==="play-lobby"){
    root.className="app";
    root.innerHTML=`<div class="fade-in center">
      <div style="font-size:2.5rem;margin-bottom:10px">✅</div>
      <h2 class="title" style="font-size:1.5rem">C'est bon !</h2>
      <p style="color:#c084fc;font-size:1.1rem;font-weight:700;margin:6px 0 28px">${esc(S.playerName)}</p>
      <div class="card center" style="padding:24px;max-width:300px">
        <p style="color:#94a3b8;font-size:14px">En attente du lancement...</p>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
      <button class="btn-ghost mt-20" id="btn-quit">Quitter</button>
    </div>`;
    document.getElementById("btn-quit").onclick=doReset;
    return;
  }

  // PLAYER QUESTION
  if(S.screen==="play-q"&&S.gs){
    root.className="app";
    const q=S.gs.questions[S.gs.currentQ];const isM=q.type==="multi";
    root.innerHTML=`<div class="fade-in center w100" style="max-width:540px">
      <div class="row mb-8" style="max-width:520px;margin:0 auto">
        <span class="mono" style="color:var(--muted);font-size:13px">${S.gs.currentQ+1}/${S.gs.totalQ}</span>
        ${isM?'<span class="badge badge-amber">MULTI</span>':""}
        <div></div>
      </div>
      ${bigTimerHTML()}
      <div class="card center mb-16 mt-12" style="padding:18px 16px;max-width:520px">
        <h2 style="font-size:1.15rem;line-height:1.5;font-weight:700">${esc(q.q)}</h2>
      </div>
      <div class="answers cols-2" style="max-width:520px;margin:0 auto">${answerGrid(q,true,true)}</div>
      ${isM&&!S.answered?`<button class="btn btn-purple mt-16" id="btn-val" ${!S.selectedAnswers.length?"disabled":""} style="max-width:340px">Valider (${S.selectedAnswers.length})</button>`:""}
      ${S.answered?'<p style="color:var(--green);margin-top:14px;font-weight:700;font-size:14px">✓ Envoyé !</p>':""}
    </div>`;
    root.querySelectorAll("[data-ans]").forEach(el=>el.onclick=()=>doToggle(+el.dataset.ans));
    const vb=document.getElementById("btn-val");if(vb)vb.onclick=()=>doSubmit(S.selectedAnswers);
    return;
  }

  // PLAYER WAIT
  if(S.screen==="play-w"){
    root.className="app";
    const me=S.players.find(p=>p.name===S.playerName);
    const rank=S.players.findIndex(p=>p.name===S.playerName)+1;
    const emoji=me?.lastCorrect?"🎉":me?.lastPartial?"🤏":"😬";
    const msg=me?.lastCorrect?"Bravo !":me?.lastPartial?"Presque !":"Raté !";
    const clr=me?.lastCorrect?"var(--green)":me?.lastPartial?"var(--amber)":"var(--red)";
    const medal=rank<=0?"":rank===1?"🥇":rank===2?"🥈":rank===3?"🥉":`#${rank}`;
    // Show correct answer(s)
    const q=S.gs?.questions?.[S.gs.currentQ];
    const correctHTML=q?q.answers.map(ai=>`<span style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:10px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);font-weight:700;font-size:13px;color:var(--green)">${SHAPES[ai]||"◆"} ${esc(q.options[ai])}</span>`).join(" "):"";
    root.innerHTML=`<div class="fade-in center" style="max-width:440px;width:100%">
      <div style="font-size:3rem;margin-bottom:8px">${emoji}</div>
      <h2 class="title" style="font-size:1.4rem;color:${clr}">${msg}</h2>
      <p style="color:#c084fc;font-size:1.1rem;margin:8px 0 16px;font-weight:700">${medal}${medal?" — ":""}${me?.score||0} pts</p>
      ${correctHTML?`<div class="card" style="padding:14px;margin-bottom:12px">
        <p style="color:var(--muted);font-size:11px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">${q.answers.length>1?"Bonnes réponses":"Bonne réponse"}</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">${correctHTML}</div>
      </div>`:""}
      <p style="color:var(--muted);font-size:13px;margin-top:8px">Question suivante...</p>
    </div>`;
    return;
  }
}

// ============ BOOT ============
function isAdmin(){ return window.location.search.toLowerCase().includes("admin"); }
function getBaseURL(){ return window.location.origin + window.location.pathname; }
function getQRUrl(code){
  const joinUrl = getBaseURL() + "#" + code;
  return "https://api.qrserver.com/v1/create-qr-code/?size=280x280&color=f0f0f5&bgcolor=080a14&data=" + encodeURIComponent(joinUrl);
}
function downloadQR(){
  const code = S.gameCode;
  const url = getQRUrl(code);
  const a = document.createElement("a");
  a.href = url; a.download = "quiz-" + code + ".png"; a.target = "_blank";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

window.addEventListener("DOMContentLoaded",()=>{
  if(!initFirebase()) return;
  // Check if player arrived via QR code with hash code
  const hash = window.location.hash.replace("#","").trim();
  if(hash && hash.length === 6 && !isAdmin()){
    setState({screen:"player-join", joinCode: hash.toUpperCase(), error:""});
  } else if(isAdmin()){
    setState({screen:"admin-login", error:"", adminPw:""});
  } else {
    setState({screen:"player-join", error:""});
  }
});
</script>
</body>
</html>
